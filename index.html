<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva Orden de Compra — Saladbowl</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      max-width: 700px;
      margin: 0 auto;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #111;
    }

    .section-title {
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #888;
      margin: 20px 0 10px;
    }

    label { display: block; font-size: .9rem; font-weight: 500; margin-bottom: 4px; }

    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: .95rem;
      outline: none;
      transition: border-color .15s;
      background: #fff;
    }
    input:focus, select:focus, textarea:focus { border-color: #4a90e2; }

    .field { margin-bottom: 14px; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Items table */
    .items-header {
      display: grid;
      grid-template-columns: 2fr 80px 100px 90px 36px;
      gap: 6px;
      font-size: .75rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: 0 4px 6px;
    }

    .item-row {
      display: grid;
      grid-template-columns: 2fr 80px 100px 90px 36px;
      gap: 6px;
      margin-bottom: 8px;
      align-items: center;
    }

    .item-row input, .item-row select {
      padding: 9px 10px;
      font-size: .88rem;
    }

    .btn-remove {
      background: none;
      border: 1.5px solid #eee;
      border-radius: 6px;
      color: #ccc;
      font-size: 1rem;
      cursor: pointer;
      height: 38px;
      width: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }
    .btn-remove:hover { border-color: #f66; color: #f66; }

    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1.5px dashed #ccc;
      border-radius: 8px;
      color: #666;
      font-size: .9rem;
      padding: 9px 16px;
      cursor: pointer;
      margin-top: 4px;
      transition: all .15s;
    }
    .btn-add:hover { border-color: #4a90e2; color: #4a90e2; }

    .btn-submit {
      width: 100%;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 24px;
      transition: background .15s;
    }
    .btn-submit:hover { background: #444; }
    .btn-submit:disabled { background: #aaa; cursor: not-allowed; }

    .status {
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      margin-top: 14px;
      font-size: .9rem;
      display: none;
    }
    .status.loading { display: block; background: #f0f4ff; color: #4a90e2; }
    .status.success { display: block; background: #e8f8ed; color: #2e7d4f; }
    .status.error   { display: block; background: #fff0f0; color: #c0392b; }

    .loader {
      text-align: center;
      padding: 40px;
      color: #aaa;
      font-size: .9rem;
    }

    @media (max-width: 500px) {
      .items-header { grid-template-columns: 1fr 70px 80px 80px 34px; font-size: .68rem; }
      .item-row     { grid-template-columns: 1fr 70px 80px 80px 34px; }
      .grid-2       { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="card">
  <h1>🛒 Nueva Orden de Compra</h1>

  <div id="form-loader" class="loader">Cargando datos…</div>

  <form id="oc-form" style="display:none" novalidate>

    <p class="section-title">Proveedor y entrega</p>

    <div class="field">
      <label for="proveedor">Proveedor *</label>
      <select id="proveedor" required>
        <option value="">— Seleccioná un proveedor —</option>
      </select>
    </div>

    <div class="grid-2">
      <div class="field">
        <label for="local">Local de recepción *</label>
        <select id="local" required>
          <option value="">— Seleccioná —</option>
          <option>Local 1</option>
          <option>Local 2</option>
          <option>Local 3</option>
        </select>
      </div>
      <div class="field">
        <label for="fecha">Fecha de entrega estimada</label>
        <input type="date" id="fecha" />
      </div>
    </div>

    <div class="field">
      <label for="notas">Notas adicionales</label>
      <textarea id="notas" rows="2" placeholder="Indicaciones especiales, horario de entrega, etc."></textarea>
    </div>

    <p class="section-title">Ítems del pedido</p>

    <div class="items-header">
      <span>Insumo</span>
      <span>Cantidad</span>
      <span>Unidad</span>
      <span>Precio unit.</span>
      <span></span>
    </div>

    <div id="items-container"></div>

    <button type="button" class="btn-add" onclick="addRow()">
      <span style="font-size:1.1rem">+</span> Agregar ítem
    </button>

    <button type="submit" class="btn-submit" id="btn-submit">Enviar Orden</button>

    <div class="status" id="status"></div>
  </form>
</div>

<script>
  const DATA_URL   = 'https://juanautomatationai.app.n8n.cloud/webhook/form-data';
  const SUBMIT_URL = 'https://juanautomatationai.app.n8n.cloud/webhook/wf1-nueva-oc';

  let proveedores = [];
  let insumos     = [];

  // ── Cargar datos desde n8n ──────────────────────────────────────────────────
  async function loadData() {
    try {
      const res  = await fetch(DATA_URL);
      const data = await res.json();
      proveedores = data.proveedores || [];
      insumos     = data.insumos     || [];

      // Poblar dropdown proveedor
      const sel = document.getElementById('proveedor');
      proveedores.forEach(p => {
        const opt = document.createElement('option');
        opt.value       = p.id;
        opt.textContent = p.nombre;
        sel.appendChild(opt);
      });

      document.getElementById('form-loader').style.display = 'none';
      document.getElementById('oc-form').style.display     = 'block';

      addRow(); // primera fila vacía
    } catch (e) {
      document.getElementById('form-loader').textContent =
        '⚠️ Error al cargar datos. Recargá la página.';
    }
  }

  // ── Agregar fila de ítem ────────────────────────────────────────────────────
  function addRow() {
    const container = document.getElementById('items-container');
    const idx       = container.children.length;

    const row = document.createElement('div');
    row.className = 'item-row';
    row.dataset.idx = idx;

    // Dropdown insumos
    const selInsumo = document.createElement('select');
    selInsumo.className  = 'insumo-sel';
    selInsumo.innerHTML  = '<option value="">— Insumo —</option>';
    insumos.forEach(ins => {
      const opt = document.createElement('option');
      opt.value = ins.id;
      opt.dataset.nombre = ins.nombre;
      opt.dataset.unidad = ins.unidad;
      opt.dataset.precio = ins.precio;
      opt.textContent = ins.nombre;
      selInsumo.appendChild(opt);
    });
    selInsumo.addEventListener('change', () => onInsumoChange(row));

    // Cantidad
    const inpCant = document.createElement('input');
    inpCant.type        = 'number';
    inpCant.className   = 'cantidad-inp';
    inpCant.placeholder = '0';
    inpCant.min         = '0';
    inpCant.step        = 'any';

    // Unidad (readonly, se llena solo)
    const inpUnidad = document.createElement('input');
    inpUnidad.type        = 'text';
    inpUnidad.className   = 'unidad-inp';
    inpUnidad.placeholder = '—';
    inpUnidad.readOnly    = true;
    inpUnidad.style.background = '#f9f9f9';
    inpUnidad.style.color      = '#555';

    // Precio
    const inpPrecio = document.createElement('input');
    inpPrecio.type        = 'number';
    inpPrecio.className   = 'precio-inp';
    inpPrecio.placeholder = '0';
    inpPrecio.min         = '0';
    inpPrecio.step        = 'any';

    // Botón eliminar
    const btnDel = document.createElement('button');
    btnDel.type      = 'button';
    btnDel.className = 'btn-remove';
    btnDel.innerHTML = '✕';
    btnDel.addEventListener('click', () => row.remove());

    row.appendChild(selInsumo);
    row.appendChild(inpCant);
    row.appendChild(inpUnidad);
    row.appendChild(inpPrecio);
    row.appendChild(btnDel);

    container.appendChild(row);
  }

  // Auto-completar unidad y precio al seleccionar insumo
  function onInsumoChange(row) {
    const sel = row.querySelector('.insumo-sel');
    const opt = sel.options[sel.selectedIndex];
    row.querySelector('.unidad-inp').value = opt.dataset.unidad || '';
    const precio = parseFloat(opt.dataset.precio) || 0;
    row.querySelector('.precio-inp').value = precio > 0 ? precio : '';
  }

  // ── Enviar formulario ───────────────────────────────────────────────────────
  document.getElementById('oc-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const provSel    = document.getElementById('proveedor');
    const localSel   = document.getElementById('local');
    const fechaInp   = document.getElementById('fecha');
    const notasInp   = document.getElementById('notas');
    const statusDiv  = document.getElementById('status');
    const btnSubmit  = document.getElementById('btn-submit');

    // Validar campos obligatorios
    if (!provSel.value) {
      alert('Seleccioná un proveedor.');
      return;
    }
    if (!localSel.value) {
      alert('Seleccioná el local de recepción.');
      return;
    }

    // Recopilar ítems
    const rows = document.querySelectorAll('#items-container .item-row');
    const items = [];
    let hasError = false;

    rows.forEach(row => {
      const insumoSel = row.querySelector('.insumo-sel');
      const cantidad  = parseFloat(row.querySelector('.cantidad-inp').value);
      const unidad    = row.querySelector('.unidad-inp').value;
      const precio    = parseFloat(row.querySelector('.precio-inp').value) || 0;

      if (!insumoSel.value && !cantidad) return; // fila vacía, ignorar

      if (!insumoSel.value) { alert('Seleccioná el insumo en todas las filas.'); hasError = true; return; }
      if (!cantidad || cantidad <= 0) { alert('Ingresá una cantidad válida en todos los ítems.'); hasError = true; return; }

      const opt = insumoSel.options[insumoSel.selectedIndex];
      items.push({
        insumo_id: insumoSel.value,
        producto:  opt.dataset.nombre,
        cantidad,
        unidad,
        precio_unitario: precio
      });
    });

    if (hasError) return;
    if (items.length === 0) { alert('Agregá al menos un ítem al pedido.'); return; }

    // Armar payload
    const provOpt = provSel.options[provSel.selectedIndex];
    const payload = {
      proveedor_id:    provSel.value,
      proveedor_nombre: provOpt.textContent,
      local:           localSel.value,
      fecha_entrega:   fechaInp.value || '',
      notas:           notasInp.value || '',
      items
    };

    // Enviar
    btnSubmit.disabled = true;
    statusDiv.className = 'status loading';
    statusDiv.textContent = 'Enviando orden…';

    try {
      const res = await fetch(SUBMIT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        statusDiv.className = 'status success';
        statusDiv.textContent = '✅ Orden enviada correctamente. Juan recibirá una notificación para aprobarla.';
        document.getElementById('oc-form').reset();
        document.getElementById('items-container').innerHTML = '';
        addRow();
      } else {
        throw new Error('HTTP ' + res.status);
      }
    } catch (err) {
      statusDiv.className = 'status error';
      statusDiv.textContent = '❌ Error al enviar. Intentá de nuevo o avisá a Juan.';
      btnSubmit.disabled = false;
    }
  });

  // Iniciar
  loadData();
</script>
</body>
</html>
