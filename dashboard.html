<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard OC — Saladbowl</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 16px;
    }

    .header {
      max-width: 800px;
      margin: 0 auto 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .header h1 { font-size: 1.3rem; font-weight: 700; color: #111; }
    .header .fecha { font-size: .82rem; color: #888; }

    .section-title {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #888;
      margin: 24px 0 10px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
    .section-title.hoy { color: #d97706; }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px 20px;
      max-width: 800px;
      margin: 0 auto 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,.07);
    }
    .card.hoy { border-left: 4px solid #f59e0b; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      gap: 12px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #111;
    }
    .card-sub {
      font-size: .82rem;
      color: #666;
      margin-top: 2px;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-pendiente    { background: #fef3c7; color: #92400e; }
    .badge-recibida     { background: #d1fae5; color: #065f46; }
    .badge-diferencias  { background: #fee2e2; color: #991b1b; }
    .badge-borrador     { background: #e5e7eb; color: #4b5563; }
    .badge-default      { background: #f3f4f6; color: #6b7280; }

    .lineas {
      margin-top: 10px;
      border-top: 1px solid #f0f0f0;
      padding-top: 10px;
    }
    .linea-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .85rem;
      padding: 3px 0;
      color: #444;
    }
    .linea-row .producto { flex: 1; }
    .linea-row .cantidad {
      font-weight: 600;
      color: #222;
      white-space: nowrap;
    }
    .linea-row .cantidad.recibida { color: #16a34a; }

    .loader {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: .9rem;
      max-width: 800px;
      margin: 0 auto;
    }

    .empty {
      background: #fff;
      border-radius: 12px;
      padding: 32px 20px;
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      color: #aaa;
      font-size: .9rem;
    }

    .refresh-btn {
      display: block;
      max-width: 800px;
      margin: 20px auto 0;
      background: none;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      font-size: .85rem;
      color: #888;
      cursor: pointer;
      width: 100%;
      transition: all .15s;
    }
    .refresh-btn:hover { border-color: #aaa; color: #555; }

    @media (max-width: 500px) {
      .card-title { font-size: .95rem; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>📋 Órdenes de Compra</h1>
  <span class="fecha" id="fecha-hoy"></span>
</div>

<div id="contenido">
  <div class="loader">Cargando órdenes…</div>
</div>

<button class="refresh-btn" onclick="loadData()">↻ Actualizar</button>

<script>
  const DASHBOARD_URL = 'https://juanautomatationai.app.n8n.cloud/webhook/wf-dashboard';

  const DIAS = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  function formatFecha(isoDate) {
    if (!isoDate) return '—';
    const [y, m, d] = isoDate.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    return DIAS[dt.getDay()] + ' ' + d + ' de ' + MESES[m - 1];
  }

  function badgeClass(estado) {
    const e = (estado || '').toLowerCase();
    if (e === 'pendiente')        return 'badge-pendiente';
    if (e === 'recibida')         return 'badge-recibida';
    if (e.includes('diferencia')) return 'badge-diferencias';
    if (e === 'borrador')         return 'badge-borrador';
    return 'badge-default';
  }

  function renderOC(oc) {
    const card = document.createElement('div');
    card.className = 'card' + (oc.es_hoy ? ' hoy' : '');

    const lineasHtml = oc.lineas.length > 0
      ? '<div class="lineas">' + oc.lineas.map(l => {
          const cantStr = l.cantidad_recibida !== null
            ? l.cantidad_recibida + ' / ' + l.cantidad_pedida + ' ' + l.unidad
            : l.cantidad_pedida + ' ' + l.unidad;
          const recibida = l.cantidad_recibida !== null;
          return `<div class="linea-row">
            <span class="producto">${l.producto}</span>
            <span class="cantidad${recibida ? ' recibida' : ''}">${cantStr}</span>
          </div>`;
        }).join('') + '</div>'
      : '';

    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="card-title">${oc.proveedor}</div>
          <div class="card-sub">${oc.oc_id} · ${oc.local} · ${formatFecha(oc.fecha_entrega)}</div>
        </div>
        <span class="badge ${badgeClass(oc.estado)}">${oc.estado}</span>
      </div>
      ${lineasHtml}
    `;
    return card;
  }

  async function loadData() {
    document.getElementById('contenido').innerHTML = '<div class="loader">Cargando órdenes…</div>';

    // Fecha de hoy
    const now = new Date();
    document.getElementById('fecha-hoy').textContent =
      DIAS[now.getDay()] + ' ' + now.getDate() + ' de ' + MESES[now.getMonth()] + ' ' + now.getFullYear();

    try {
      const res  = await fetch(DASHBOARD_URL);
      const data = await res.json();
      const ocs  = data.ocs || [];

      if (ocs.length === 0) {
        document.getElementById('contenido').innerHTML =
          '<div class="empty">No hay órdenes programadas para esta semana.</div>';
        return;
      }

      const hoy     = ocs.filter(oc => oc.es_hoy);
      const semana  = ocs.filter(oc => !oc.es_hoy);
      const frag    = document.createDocumentFragment();

      if (hoy.length > 0) {
        const t = document.createElement('p');
        t.className = 'section-title hoy';
        t.textContent = 'Hoy';
        frag.appendChild(t);
        hoy.forEach(oc => frag.appendChild(renderOC(oc)));
      }

      if (semana.length > 0) {
        const t = document.createElement('p');
        t.className = 'section-title';
        t.textContent = 'Próximos días';
        frag.appendChild(t);
        semana.forEach(oc => frag.appendChild(renderOC(oc)));
      }

      const contenido = document.getElementById('contenido');
      contenido.innerHTML = '';
      contenido.appendChild(frag);

    } catch (e) {
      document.getElementById('contenido').innerHTML =
        '<div class="empty">⚠️ Error al cargar. Tocá "Actualizar" para reintentar.</div>';
    }
  }

  loadData();
</script>
</body>
</html>
